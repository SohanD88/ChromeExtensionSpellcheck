<html lang="en">
<head>
    <title>Floh</title>
    <link rel="stylesheet" type="text/css" href="popup.css">
</head>
<body>
    <main class="menu">
        <header class="menu-header">
            <div class="brand-mark">F</div>
            <div class="brand-copy">
                <h1>Floh</h1>
                <p>Writing helper</p>
            </div>
            <span id="status-text" class="status-pill">On</span>
        </header>

        <section class="setting-row">
            <div>
                <label for="enabled" class="setting-title">Spellcheck</label>
                <p class="setting-description">Highlight and fix typos in web editors.</p>
            </div>

            <label class="switch" aria-label="Enable Floh spellcheck">
                <input id="enabled" type="checkbox">
                <span class="slider"></span>
            </label>
        </section>

        <section class="field-group">
            <label for="hotkey">Shortcut</label>
            <input id="hotkey" type="text" spellcheck="false" autocomplete="off">
            <p>Click the field, then press the key combo you want to use.</p>
        </section>

        <section class="field-group ignored-words-section">
            <label for="ignored-word-input">Ignored words</label>
            <div class="ignored-word-form">
                <input id="ignored-word-input" type="text" spellcheck="false" autocomplete="off" placeholder="Add a word">
                <button id="add-ignored-word" type="button">Add</button>
            </div>
            <div id="ignored-words-list" class="ignored-words-list"></div>
            <p id="ignored-words-empty">No ignored words yet.</p>
        </section>

    </main>

    <script src="popup.js"></script>
</body>
</html>
